<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Image Styling Practice</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .img-box {
      width: 33%;
    }

    img {
      width: 100%;
      display: block;
    }

    /* Left image (rounded, no distortion) */
    .left img {
      border-radius: 18px;
      object-fit: cover; /* keep ratio */
    }

    /* Middle image (circle) */
    .middle img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      margin: 0 auto;
    }

    /* Right image (distorted) */
    .right img {
      width: 100%;
      height: 300px; /* force distortion */
      object-fit: fill; /* stretch */
    }

  </style>
</head>

<body>
  <div class="container">

    <!-- Left -->
    <div class="img-box left">
      <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" alt="Paris">
    </div>

    <!-- Middle -->
    <div class="img-box middle">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Lake">
    </div>

    <!-- Right -->
    <div class="img-box right">
      <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" alt="Paris distorted">
    </div>

  </div>
</body>
</html>
